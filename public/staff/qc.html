<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORP QC Shift Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0d0f12;color:#e4e2d8;min-height:100vh;padding:0;font-size:17px}
.nav{background:#0a0c0f;border-bottom:1px solid #2a2c33;padding:16px 32px;display:flex;gap:16px;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.nav a{color:#6a6858;text-decoration:none;font-size:18px;font-weight:600;padding:10px 20px;border-radius:8px;transition:all .2s}
.nav a:hover{color:#e4e2d8;background:#1a1d24}
.nav a.active{color:#5DCAA5;background:#0a1a15;border:1px solid #1a3a2a}
.content{padding:32px;max-width:1400px;margin:0 auto}
.two-col{display:grid;grid-template-columns:420px 1fr;gap:24px;align-items:start}
.left-col{display:flex;flex-direction:column;gap:24px}
.header-row{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:28px}
h1{font-size:36px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;color:#f5f3e8}
.subtitle{font-size:18px;color:#8a8878;font-family:'Space Mono',monospace}
.status-line{font-family:'Space Mono',monospace;color:#6a6858;font-size:13px;text-align:right}
.section{background:#14161b;border:1px solid #2a2c33;border-radius:12px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.section::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7F77DD,#5DCAA5);border-radius:12px 12px 0 0}
.section-title{font-size:20px;font-weight:700;margin-bottom:20px;color:#f5f3e8;display:flex;align-items:center;gap:8px}
.section-title .dot{width:8px;height:8px;border-radius:50%;background:#5DCAA5;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.field{display:flex;flex-direction:column;gap:8px}
.field.full{grid-column:1/-1}
.field.wide{grid-column:span 2}
label,.label{font-size:12px;font-weight:700;color:#8a8878;text-transform:uppercase;letter-spacing:.6px;font-family:'Space Mono',monospace}
input,select,textarea{width:100%;background:#1a1d24;border:1px solid #2a2c33;border-radius:8px;color:#e4e2d8;font:inherit;padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:#5DCAA5;box-shadow:0 0 0 3px rgba(93,202,165,.12)}
textarea{min-height:108px;resize:vertical;line-height:1.45}
.segmented,.tag-row{display:flex;gap:8px;flex-wrap:wrap}
.segmented button,.tag-button,.small-button{appearance:none;border:1px solid #2a2c33;background:#1a1d24;color:#8a8878;border-radius:8px;padding:10px 14px;font:inherit;font-weight:700;cursor:pointer;transition:all .2s}
.segmented button:hover,.tag-button:hover,.small-button:hover{color:#e4e2d8;border-color:#4a4c53}
.segmented button.active,.tag-button.active{color:#f5f3e8;border-color:#5DCAA5;background:#0a1a15}
.segmented .day.active{border-color:#3B8BD4;background:#0b1b2a;color:#9cc9f2}
.segmented .night.active{border-color:#7F77DD;background:#171533;color:#c7c1ff}
.segmented .pass.active{border-color:#5DCAA5;background:#0a1a15;color:#5DCAA5}
.segmented .flag.active{border-color:#F2A623;background:#2a1d06;color:#F2A623}
.segmented .fail.active{border-color:#E8593C;background:#2a1110;color:#ff8b7a}
.hint{font-family:'Space Mono',monospace;color:#6a6858;font-size:12px;margin-top:2px}
.submit-button{grid-column:1/-1;width:100%;background:#5DCAA5;color:#07100d;border:0;border-radius:8px;padding:15px 18px;font:inherit;font-size:17px;font-weight:800;cursor:pointer;transition:filter .2s,transform .2s}
.submit-button:hover{filter:brightness(1.08)}
.submit-button:disabled{opacity:.55;cursor:not-allowed;transform:none}
.sticky-note{background:#1a1500;border-color:#5a4a00}
.sticky-note::before{background:linear-gradient(90deg,#F2A623,#5DCAA5)}
.sticky-top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:12px}
.sticky-message{white-space:pre-wrap;line-height:1.55;color:#f5e6a8;min-height:28px}
.sticky-meta{font-family:'Space Mono',monospace;color:#a9903a;font-size:12px;margin-top:10px}
.filter-bar{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
.filter-bar .field{min-width:170px}
.feed{display:flex;flex-direction:column;gap:14px}
.entry-card{background:#14161b;border:1px solid #2a2c33;border-radius:12px;padding:18px;position:relative;overflow:hidden}
.entry-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7F77DD,#5DCAA5);border-radius:12px 12px 0 0}
.entry-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:12px}
.worker{font-size:19px;font-weight:800;color:#f5f3e8;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta{font-family:'Space Mono',monospace;color:#6a6858;font-size:12px;text-align:right;line-height:1.5}
.badge{display:inline-flex;align-items:center;border-radius:999px;border:1px solid #2a2c33;padding:3px 9px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge.director{border-color:#5DCAA5;color:#5DCAA5;background:#0a1a15}
.badge.day{border-color:#3B8BD4;color:#9cc9f2;background:#0b1b2a}
.badge.night{border-color:#7F77DD;color:#c7c1ff;background:#171533}
.badge.pass{border-color:#5DCAA5;color:#5DCAA5;background:#0a1a15}
.badge.flag{border-color:#F2A623;color:#F2A623;background:#2a1d06}
.badge.fail{border-color:#E8593C;color:#ff8b7a;background:#2a1110}
.entry-body{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
.job{font-size:16px;color:#e4e2d8;margin-bottom:10px}
.job span{color:#8a8878;font-family:'Space Mono',monospace;font-size:13px}
.task-tags{display:flex;gap:6px;flex-wrap:wrap}
.task-pill{background:#1a1d24;border:1px solid #2a2c33;border-radius:999px;padding:4px 9px;color:#c4c2b8;font-size:12px;font-family:'Space Mono',monospace}
.metrics{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.metric{background:#1a1d24;border:1px solid #2a2c33;border-radius:8px;padding:8px 10px;min-width:88px;text-align:center}
.metric-value{font-family:'Space Mono',monospace;color:#e4e2d8;font-weight:700}
.metric-label{font-family:'Space Mono',monospace;color:#6a6858;font-size:10px;text-transform:uppercase;margin-top:2px}
.notes{color:#c4c2b8;line-height:1.55;margin-top:12px;white-space:pre-wrap}
.show-more{appearance:none;background:transparent;border:0;color:#5DCAA5;font:inherit;font-weight:700;cursor:pointer;padding:6px 0 0}
.empty,.error,.loading{font-family:'Space Mono',monospace;color:#6a6858;text-align:center;padding:32px 0}
.error{color:#ff8b7a}
.spinner{width:24px;height:24px;border:3px solid #2a2c33;border-top-color:#5DCAA5;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .content{padding:16px}
  .nav{padding:12px 16px;gap:6px;flex-direction:column}
  .nav a{font-size:16px;padding:10px 16px;width:100%;text-align:center}
  .nav img{height:60px !important;margin:0 auto 4px !important}
  .header-row{flex-direction:column;align-items:flex-start;gap:10px;margin-bottom:20px}
  .status-line{text-align:left}
  h1{font-size:28px}
  .subtitle{font-size:14px}
  .section{padding:16px}
  .form-grid{grid-template-columns:1fr}
  .field.wide{grid-column:1}
  .sticky-top,.entry-head{flex-direction:column;align-items:flex-start}
  .meta{text-align:left}
  .entry-body{grid-template-columns:1fr}
  .metrics{justify-content:flex-start}
  .filter-bar .field{min-width:100%;width:100%}
  .two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="nav">
<img src="/staff/norp-logo.png" alt="NORP" style="height:90px;margin-right:12px">
<a href="/staff">Operations Guide</a>
<a href="/staff/pricing">Pricing &amp; Market</a>
<a href="/staff/suppliers">PVC Suppliers</a>
<a href="/staff/plants">Plant Directory</a>
<a href="/staff/mastering">Mastering &amp; Plating</a>
<a href="/staff/inventory">Inventory</a>
<a href="/staff/qc" class="active">QC Log</a>
</div>

<main class="content">
  <div class="header-row">
    <div>
      <h1>QC Shift Log</h1>
      <div class="subtitle">quality control &middot; shift tracking</div>
    </div>
    <div class="status-line" id="refreshStatus">Loading QC log</div>
  </div>

  <div class="two-col">
  <div class="left-col">
  <section class="section">
    <div class="section-title"><span class="dot"></span> New Entry</div>
    <form id="entryForm" class="form-grid">
      <div class="field">
        <label for="workerName">Worker name</label>
        <select id="workerName" required>
          <option value="Sarah">Sarah (QC Director)</option>
          <option value="August">August</option>
          <option value="Moon">Moon</option>
          <option value="Jen">Jen</option>
          <option value="Anker">Anker</option>
          <option value="__add_new__">+ Add new worker...</option>
        </select>
      </div>

      <div class="field">
        <div class="label">Shift</div>
        <div class="segmented" data-toggle="shift">
          <button type="button" class="day" data-value="day">Day</button>
          <button type="button" class="night" data-value="night">Night</button>
        </div>
        <div class="hint" id="shiftHint">Day 6am-6pm &middot; Night 6pm-6am</div>
      </div>

      <div class="field">
        <label for="entryDate">Date</label>
        <input id="entryDate" type="date" required>
      </div>

      <div class="field">
        <label for="jobRef">Artist &amp; Matrix ID</label>
        <input id="jobRef" type="text" placeholder="Artist name, matrix ID">
      </div>

      <div class="field full">
        <div class="label">Task type</div>
        <div class="tag-row" id="taskTypes">
          <button type="button" class="tag-button" data-value="Pressing QC/Sleeving">Pressing QC/Sleeving</button>
          <button type="button" class="tag-button" data-value="Assembly">Assembly</button>
          <button type="button" class="tag-button" data-value="Shrink Wrap">Shrink Wrap</button>
          <button type="button" class="tag-button" data-value="Boxing &amp; Packaging">Boxing &amp; Packaging</button>
          <button type="button" class="tag-button" data-value="Sorting">Sorting</button>
          <button type="button" class="tag-button" data-value="Other" id="tagOther">Other</button>
          <input id="otherTaskInput" type="text" placeholder="Describe task..." style="display:none;margin-top:8px;background:#1a1d24;border:1px solid #2a2c33;border-radius:8px;padding:8px 12px;color:#e4e2d8;font-family:inherit;font-size:15px;width:100%">
        </div>
      </div>

      <div class="field">
        <label for="durationHours">Duration</label>
        <input id="durationHours" type="number" min="0" step="0.5" placeholder="Hours">
      </div>

      <div class="field">
        <label for="quantity">Quantity</label>
        <input id="quantity" type="number" min="0" step="1" placeholder="Units">
      </div>


      <div class="field full">
        <label for="notes">Notes</label>
        <textarea id="notes" placeholder="Describe defects, decisions, pulls, fixes, holds, or handoff details."></textarea>
      </div>

      <button class="submit-button" id="submitButton" type="submit">Submit QC Entry</button>
    </form>
  </section>

  <section class="section sticky-note" id="stickyNote">
    <div class="section-title" style="margin-bottom:12px"><span class="dot" style="background:#F2A623"></span> Message Board</div>
    <div class="field" style="margin-bottom:12px">
      <div class="label">To</div>
      <div class="segmented" data-toggle="stickyTarget">
        <button type="button" class="active" data-value="qc">Message QC</button>
        <button type="button" data-value="leadership">Message Leadership</button>
      </div>
    </div>
    <div class="sticky-meta" id="stickyMeta"></div>
    <div class="field" style="margin-top:12px">
      <textarea id="stickyText" placeholder="Leave a message..."></textarea>
    </div>
    <div class="field" style="margin-top:12px">
      <label for="stickyBy">From</label>
      <select id="stickyBy">
        <option value="Sarah">Sarah</option>
        <option value="August">August</option>
        <option value="Moon">Moon</option>
        <option value="Jen">Jen</option>
        <option value="Anker">Anker</option>
        <option value="__add_new__">+ Add new worker...</option>
      </select>
    </div>
    <button class="submit-button" type="button" id="saveSticky" style="margin-top:14px">Post Message</button>
  </section>
  </div><!-- end left-col -->

  <section class="section">
    <div class="section-title"><span class="dot"></span> Log Feed</div>
    <div class="filter-bar">
      <div class="field">
        <div class="label">Shift</div>
        <div class="segmented" data-toggle="filterShift">
          <button type="button" class="active" data-value="all">All</button>
          <button type="button" class="day" data-value="day">Day</button>
          <button type="button" class="night" data-value="night">Night</button>
        </div>
      </div>
      <div class="field">
        <label for="workerFilter">Worker</label>
        <select id="workerFilter">
          <option value="all">All workers</option>
          <option value="Sarah">Sarah</option>
          <option value="August">August</option>
          <option value="Moon">Moon</option>
          <option value="Jen">Jen</option>
          <option value="Anker">Anker</option>
        </select>
      </div>
    </div>
    <div id="feed" class="feed">
      <div class="loading"><div class="spinner"></div>Loading entries...</div>
    </div>
  </section>
  </div><!-- end two-col -->
</main>

<script>
(function() {
  const state = {
    shift: 'day',
    filterShift: 'all',
    stickyTarget: 'qc',
    entries: [],
    sticky: null,
    loadingEntries: true,
  };

  const els = {
    form: document.getElementById('entryForm'),
    workerName: document.getElementById('workerName'),
    entryDate: document.getElementById('entryDate'),
    jobRef: document.getElementById('jobRef'),
    durationHours: document.getElementById('durationHours'),
    quantity: document.getElementById('quantity'),
    notes: document.getElementById('notes'),
    taskTypes: document.getElementById('taskTypes'),
    submitButton: document.getElementById('submitButton'),
    feed: document.getElementById('feed'),
    refreshStatus: document.getElementById('refreshStatus'),
    workerFilter: document.getElementById('workerFilter'),
    shiftHint: document.getElementById('shiftHint'),
    stickyNote: document.getElementById('stickyNote'),
    stickyMessage: document.getElementById('stickyMessage'),
    stickyMeta: document.getElementById('stickyMeta'),
    stickyText: document.getElementById('stickyText'),
    stickyBy: document.getElementById('stickyBy'),
    saveSticky: document.getElementById('saveSticky'),
  };

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatDateTime(value) {
    if (!value) return '';
    return new Date(value).toLocaleString([], {
      month: 'short',
      day: 'numeric',
      year: 'numeric',
      hour: 'numeric',
      minute: '2-digit',
    });
  }

  function formatTime(value) {
    if (!value) return 'unknown time';
    return new Date(value).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function setToggle(group, value) {
    state[group] = value;
    document.querySelectorAll(`[data-toggle="${group}"] button`).forEach((button) => {
      button.classList.toggle('active', button.dataset.value === value);
    });
  }

  function selectedTasks() {
    const tasks = Array.from(els.taskTypes.querySelectorAll('.active')).map((button) => button.dataset.value);
    const otherInput = document.getElementById('otherTaskInput');
    const otherVal = otherInput && otherInput.value.trim();
    // Replace generic 'Other' with the typed value if provided
    return tasks.map(t => (t === 'Other' && otherVal) ? otherVal : t);
  }

  function createdAtFromDate(dateValue) {
    if (!dateValue) return new Date().toISOString();
    const now = new Date();
    const parts = dateValue.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2], now.getHours(), now.getMinutes(), now.getSeconds()).toISOString();
  }

  function updateRefreshStatus() {
    els.refreshStatus.textContent = `Updated ${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })} - refreshes every 60 sec`;
  }

  function entryMatches(entry) {
    const worker = els.workerFilter.value;
    if (state.filterShift !== 'all' && entry.shift !== state.filterShift) return false;
    if (worker !== 'all' && entry.worker_name !== worker) return false;
    return true;
  }

  function renderEntries() {
    if (state.loadingEntries) {
      els.feed.innerHTML = '<div class="loading"><div class="spinner"></div>Loading entries...</div>';
      return;
    }

    const entries = state.entries.filter(entryMatches);
    if (!entries.length) {
      els.feed.innerHTML = '<div class="empty">No QC entries match the current filters.</div>';
      return;
    }

    els.feed.innerHTML = entries.map((entry) => {
      const tasks = Array.isArray(entry.task_types) ? entry.task_types : [];
      const notes = entry.notes || '';
      const longNotes = notes.length > 220;
      const noteId = `note-${entry.id}`;
      const taskHtml = tasks.length
        ? tasks.map((task) => `<span class="task-pill">${escapeHtml(task)}</span>`).join('')
        : '<span class="task-pill">No task tags</span>';
      const displayNotes = longNotes ? `${notes.slice(0, 220)}...` : notes;

      return `
        <article class="entry-card">
          <div class="entry-head">
            <div class="worker">
              ${escapeHtml(entry.worker_name)}
              ${entry.is_director ? '<span class="badge director">QC Director</span>' : ''}
              <span class="badge ${escapeHtml(entry.shift)}">${escapeHtml(entry.shift)}</span>
            </div>
            <div class="meta">${formatDateTime(entry.created_at)}</div>
          </div>
          <div class="entry-body">
            <div>
              <div class="job"><span>Artist &amp; Matrix ID</span> ${escapeHtml(entry.job_ref || 'Not specified')}</div>
              <div class="task-tags">${taskHtml}</div>
            </div>
            <div class="metrics">
              <div class="metric"><div class="metric-value">${entry.duration_hours == null ? '-' : escapeHtml(entry.duration_hours)}</div><div class="metric-label">hours</div></div>
              <div class="metric"><div class="metric-value">${entry.quantity == null ? '-' : Number(entry.quantity).toLocaleString()}</div><div class="metric-label">units</div></div>
            </div>
          </div>
          ${notes ? `<div class="notes" id="${noteId}" data-full="${escapeHtml(notes)}" data-short="${escapeHtml(displayNotes)}">${escapeHtml(displayNotes)}</div>` : ''}
          ${longNotes ? `<button class="show-more" type="button" data-note="${noteId}" data-expanded="false">Show more</button>` : ''}
        </article>`;
    }).join('');
  }

  function renderSticky() {
    const sticky = state.sticky;
    els.stickyText.value = sticky && sticky.message ? sticky.message : '';
    const target = state.stickyTarget === 'leadership' ? 'Leadership' : 'QC team';
    els.stickyMeta.textContent = sticky && sticky.updated_at
      ? `Last message to ${target} from ${sticky.updated_by || 'NORP staff'} at ${formatTime(sticky.updated_at)}`
      : '';
  }

  async function fetchEntries() {
    try {
      const response = await fetch('/api/qc/entries', { cache: 'no-store' });
      if (!response.ok) throw new Error('Failed to fetch entries');
      const data = await response.json();
      state.entries = data.entries || [];
      state.loadingEntries = false;
      renderEntries();
      updateRefreshStatus();
    } catch (error) {
      console.error(error);
      state.loadingEntries = false;
      els.feed.innerHTML = '<div class="error">Could not load QC entries. Confirm the database tables exist.</div>';
      els.refreshStatus.textContent = 'QC log unavailable';
    }
  }

  async function fetchSticky() {
    try {
      const response = await fetch(`/api/qc/sticky?target=${state.stickyTarget}`, { cache: 'no-store' });
      if (!response.ok) throw new Error('Failed to fetch sticky');
      const data = await response.json();
      state.sticky = data.sticky || null;
      renderSticky();
    } catch (error) {
      console.error(error);
      els.stickyMeta.textContent = 'Could not load message.';
    }
  }

  function initializeDefaults() {
    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    els.entryDate.value = today;
    const suggestedShift = now.getHours() >= 6 && now.getHours() < 18 ? 'day' : 'night';
    setToggle('shift', suggestedShift);
    setToggle('status', 'pass');
    setToggle('filterShift', 'all');
    els.shiftHint.textContent = suggestedShift === 'day'
      ? 'Auto-suggested Day shift (6am-6pm)'
      : 'Auto-suggested Night shift (6pm-6am)';
  }

  document.querySelectorAll('[data-toggle="shift"] button').forEach((button) => {
    button.addEventListener('click', () => setToggle('shift', button.dataset.value));
  });

  document.querySelectorAll('[data-toggle="filterShift"] button').forEach((button) => {
    button.addEventListener('click', () => {
      setToggle('filterShift', button.dataset.value);
      renderEntries();
    });
  });

  document.querySelectorAll('[data-toggle="stickyTarget"] button').forEach((button) => {
    button.addEventListener('click', () => {
      setToggle('stickyTarget', button.dataset.value);
      fetchSticky();
    });
  });

  els.taskTypes.addEventListener('click', (event) => {
    const button = event.target.closest('.tag-button');
    if (!button) return;
    button.classList.toggle('active');
    // Show/hide custom Other input
    const otherInput = document.getElementById('otherTaskInput');
    const otherActive = document.getElementById('tagOther').classList.contains('active');
    otherInput.style.display = otherActive ? 'block' : 'none';
    if (!otherActive) otherInput.value = '';
  });

  els.workerFilter.addEventListener('change', renderEntries);

  els.feed.addEventListener('click', (event) => {
    const button = event.target.closest('.show-more');
    if (!button) return;
    const note = document.getElementById(button.dataset.note);
    const expanded = button.dataset.expanded === 'true';
    note.textContent = expanded ? note.dataset.short : note.dataset.full;
    button.textContent = expanded ? 'Show more' : 'Show less';
    button.dataset.expanded = expanded ? 'false' : 'true';
  });

  els.form.addEventListener('submit', async (event) => {
    event.preventDefault();
    els.submitButton.disabled = true;
    els.submitButton.textContent = 'Submitting...';

    const payload = {
      worker_name: els.workerName.value,
      shift: state.shift,
      job_ref: els.jobRef.value,
      task_types: selectedTasks(),
      duration_hours: els.durationHours.value || null,
      quantity: els.quantity.value || null,
      notes: els.notes.value,
      created_at: createdAtFromDate(els.entryDate.value),
    };

    try {
      const response = await fetch('/api/qc/entries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!response.ok) throw new Error('Failed to submit entry');
      els.form.reset();
      els.taskTypes.querySelectorAll('.active').forEach((button) => button.classList.remove('active'));
      const otherInput = document.getElementById('otherTaskInput');
      if (otherInput) { otherInput.value = ''; otherInput.style.display = 'none'; }
      initializeDefaults();
      await fetchEntries();
    } catch (error) {
      console.error(error);
      alert('Could not submit QC entry. Confirm the database tables exist and try again.');
    } finally {
      els.submitButton.disabled = false;
      els.submitButton.textContent = 'Submit QC Entry';
    }
  });

  els.saveSticky.addEventListener('click', async () => {
    els.saveSticky.disabled = true;
    els.saveSticky.textContent = 'Posting...';
    try {
      const response = await fetch('/api/qc/sticky', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: els.stickyText.value,
          updated_by: els.stickyBy.value,
          target: state.stickyTarget,
        }),
      });
      if (!response.ok) throw new Error('Failed to save sticky');
      const data = await response.json();
      state.sticky = data.sticky || null;
      renderSticky();
    } catch (error) {
      console.error(error);
      alert('Could not save the shift message.');
    } finally {
      els.saveSticky.disabled = false;
      els.saveSticky.textContent = 'Post Message';
    }
  });

  // Add new worker handler — works on workerName and stickyBy selects
  function handleAddNewWorker(selectEl) {
    if (!selectEl) return;
    selectEl.addEventListener('change', function() {
      if (this.value !== '__add_new__') return;
      const name = prompt('Enter new worker name:');
      if (!name || !name.trim()) { this.value = 'Sarah'; return; }
      const trimmed = name.trim();
      [els.workerName, document.getElementById('stickyBy')].forEach(sel => {
        if (!sel) return;
        const exists = Array.from(sel.options).some(o => o.value === trimmed);
        if (!exists) {
          const opt = document.createElement('option');
          opt.value = trimmed; opt.textContent = trimmed;
          sel.insertBefore(opt, sel.querySelector('option[value="__add_new__"]'));
        }
        sel.value = trimmed;
      });
    });
  }
  handleAddNewWorker(els.workerName);
  handleAddNewWorker(document.getElementById('stickyBy'));

  initializeDefaults();
  fetchSticky();
  fetchEntries();
  // auto-refresh removed per user request
})();
</script>
</body>
</html>
