<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORP Inventory Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090909;--panel:#121212;--card:#181818;--elevated:#202020;--text:#f2f2f2;--muted:#a0a0a0;--faint:#707070;--border:#2a2a2a;--green:#00e86a;--blue:#4da3ff;--gold:#c9a84c;--purple:#b781ff;--red:#ff4d4d;--orange:#ff8c00;--teal:#39d8d0;--pink:#ff71b8}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 14% 0%,rgba(0,232,106,.13),transparent 30%),radial-gradient(circle at 82% 6%,rgba(77,163,255,.13),transparent 26%),var(--bg);color:var(--text);min-height:100vh;font-size:16px}
.nav{background:#0a0c0f;border-bottom:1px solid #2a2c33;padding:16px 28px;display:flex;gap:14px;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.nav a{color:#d2d0c3;text-decoration:none;font-size:24px;font-weight:800;padding:13px 18px;border-radius:10px;border:1px solid #2a2c33;background:#14161b;transition:all .2s;white-space:nowrap;line-height:1}
.nav a:hover{color:#f5f3e8;background:#1c2028;border-color:#4a4c53;transform:translateY(-1px)}
.nav a.active{color:#5dcaa5;background:#0a1a15;border:1px solid #1f7d5b;box-shadow:0 0 0 1px rgba(93,202,165,.18),0 8px 18px rgba(0,0,0,.18)}
.content{padding:24px;max-width:1920px;margin:0 auto}
.header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:18px}
.eyebrow{color:var(--green);font-size:12px;font-weight:950;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
h1{font-size:38px;line-height:1.05;margin:0;color:var(--text)}
.source{color:var(--muted);font-size:13px;text-align:right;line-height:1.5}
.bar{height:12px;border-radius:999px;background:#1a1d24;overflow:hidden;margin-top:13px}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),#c9ffe0)}
.controls{align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:8px;display:flex;gap:12px;margin-bottom:16px;padding:12px}
.search{align-items:center;background:#090909;border:1px solid var(--border);border-radius:8px;display:flex;gap:10px;min-height:46px;padding:0 13px;flex:1}
.search span{color:var(--muted);font-size:18px}
.search input{background:transparent;border:0;color:var(--text);font:inherit;font-size:16px;outline:0;width:100%}
.search-count{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;white-space:nowrap}
.inventory-sections{display:grid;gap:12px}
.section{background:rgba(18,18,18,.82);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .18s,transform .18s,box-shadow .18s}
.section:hover{border-color:#444;box-shadow:0 12px 28px rgba(0,0,0,.22);transform:translateY(-1px)}
.section-head{align-items:center;background:transparent;border:0;color:inherit;cursor:pointer;display:flex;font:inherit;gap:14px;justify-content:space-between;padding:18px 16px;text-align:left;width:100%}
.section-head:hover{background:rgba(255,255,255,.025)}
.section-title{align-items:center;display:flex;gap:10px;min-width:0}
.section-dot{background:var(--green);border-radius:8px;height:38px;width:8px;flex:0 0 auto}
.section h2{font-size:20px;letter-spacing:.05em;line-height:1.1;text-transform:uppercase}
.section-sub{color:var(--muted);font-size:13px;margin-top:4px}
.section-stats{align-items:flex-end;display:flex;flex-direction:column;gap:7px}
.section-total{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:24px;font-weight:950;line-height:1}
.section-total span{color:var(--muted);font-size:12px;font-weight:800;margin-left:4px;text-transform:uppercase}
.section-hint{color:var(--faint);font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.count-pill{border:1px solid var(--border);border-radius:999px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;padding:5px 10px;white-space:nowrap}
.section-body{border-top:1px solid var(--border);max-height:700px;overflow-y:auto;overscroll-behavior:contain;background:rgba(8,8,8,.34)}
.section-body::-webkit-scrollbar{width:10px}
.section-body::-webkit-scrollbar-track{background:#0d0d0d}
.section-body::-webkit-scrollbar-thumb{background:#343434;border-radius:999px;border:2px solid #0d0d0d}
.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:12px}
.item-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:8px;box-shadow:0 8px 18px rgba(0,0,0,.28);min-width:0;padding:13px}
.item-card.low{background:linear-gradient(135deg,rgba(255,77,77,.16),var(--card) 54%);border-color:rgba(255,77,77,.72);border-left-color:var(--red)}
.compound .section-dot,.compound .item-card{border-left-color:var(--green)}
.compound .section-dot{background:var(--green)}
.print .section-dot,.print .item-card{border-left-color:var(--gold)}
.print .section-dot{background:var(--gold)}
.labels .section-dot,.labels .item-card{border-left-color:var(--blue)}
.labels .section-dot{background:var(--blue)}
.sleeves .section-dot,.sleeves .item-card{border-left-color:var(--purple)}
.sleeves .section-dot{background:var(--purple)}
.stampers .section-dot,.stampers .item-card{border-left-color:var(--teal)}
.stampers .section-dot{background:var(--teal)}
.test-presses .section-dot,.test-presses .item-card{border-left-color:var(--pink)}
.test-presses .section-dot{background:var(--pink)}
.item-top{align-items:flex-start;display:flex;gap:10px;justify-content:space-between}
.item-name{font-size:17px;font-weight:850;line-height:1.18;min-width:0;overflow-wrap:anywhere}
.item-matrix{color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;font-weight:850;margin-top:5px;overflow-wrap:anywhere}
.qty{color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:18px;font-weight:950;text-align:right;white-space:nowrap}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pill{border:1px solid var(--border);border-radius:999px;color:var(--muted);font-size:12px;font-weight:800;padding:4px 8px}
.pill.location{background:rgba(77,163,255,.12);border-color:rgba(77,163,255,.45);color:var(--blue)}
.pill.low{background:rgba(255,77,77,.12);border-color:rgba(255,77,77,.55);color:var(--red)}
.notes{color:var(--muted);font-size:13px;line-height:1.35;margin-top:10px}
.empty{color:var(--muted);font-size:14px;padding:18px}
.loading,.error{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;padding:28px;text-align:center}
.error{border-color:rgba(255,77,77,.5);color:var(--red)}
@media(max-width:1200px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:760px){body{font-size:15px}.nav{gap:8px;justify-content:flex-start;overflow-x:auto;padding:10px 12px;flex-wrap:nowrap}.nav::-webkit-scrollbar{display:none}.nav img{height:42px!important;margin-right:2px!important;flex:0 0 auto}.nav a{font-size:15px;padding:10px 12px;flex:0 0 auto}.content{padding:14px}.header{align-items:flex-start;flex-direction:column}.source{text-align:left}h1{font-size:28px}.cards{grid-template-columns:1fr}.controls{align-items:stretch;flex-direction:column}.search-count{white-space:normal}.section-head{align-items:flex-start;flex-direction:column}.section-stats{align-items:flex-start}.section-body{max-height:680px}.qty{text-align:left}}
</style>
</head>
<body>

<div class="nav">
<img src="/staff/norp-logo.png" alt="NORP" style="height:70px;margin-right:8px">
<a href="/staff">Operations Guide</a>
<a href="/staff/dashboard">Production Board</a>
<a href="/staff/inventory" class="active">Inventory</a>
<a href="/staff/qc">Shift Logs</a>
</div>

<main class="content">
  <header class="header">
    <div>
      <div class="eyebrow">New Orleans Record Press</div>
      <h1>Inventory</h1>
    </div>
    <div class="source" id="source">Loading Airtable inventory...</div>
  </header>

  <div id="root">
    <p class="loading">Loading inventory...</p>
  </div>
</main>

<script>
(function() {
  const DISPLAY_SECTIONS = [
    { key: 'compound', title: 'Compound Inventory', sub: 'PVC compound measured in pounds', sections: ['compound'], unit: 'lbs' },
    { key: 'print', title: 'Jackets & Inserts', sub: 'Printed jackets, inserts, stickers, and related print stock', sections: ['jackets', 'inserts'], unit: 'items' },
    { key: 'sleeves', title: 'Sleeves & Poly', sub: 'Inner sleeves, poly sleeves, and protective bags', sections: ['sleeves'], unit: 'items' },
    { key: 'labels', title: 'Center Labels', sub: 'Center label shelf inventory', sections: ['labels'], unit: 'items' },
    { key: 'stampers', title: 'Stamper Inventory', sub: 'Stampers, plates, and metal parts ready for production', sections: ['stampers'], unit: 'items' },
    { key: 'test-presses', title: 'Test Press Inventory', sub: 'Stored test pressings and approval copies', sections: ['testPresses'], unit: 'items' },
  ];
  let allItems = [];
  let currentData = null;
  let query = '';
  const openSections = new Set();

  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function fmt(value) {
    return Math.round(Number(value) || 0).toLocaleString();
  }

  function pct(value, max) {
    if (!max) return 0;
    return Math.max(0, Math.min(100, (value / max) * 100));
  }

  function normalizeLegacy(data) {
    const inv = data.legacy || data;
    const items = [];
    const pvcColors = inv.pvc && inv.pvc.colors ? inv.pvc.colors : {};
    Object.keys(pvcColors).forEach(key => {
      const lbs = pvcColors[key].lbs || 0;
      items.push({
        id: `pvc-${key}`,
        tableName: 'Local PVC',
        section: 'compound',
        sectionTitle: 'Compound Inventory',
        item: key.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase()),
        artist: '',
        matrix: '',
        quantity: lbs,
        quantityLabel: `${lbs.toLocaleString()} lbs`,
        unit: 'lbs',
        location: 'PVC Storage',
        status: pvcColors[key].status || '',
        notes: ''
      });
    });
    return { ...data, items, pvcCapacityLbs: inv.pvc && inv.pvc.capacity ? inv.pvc.capacity : 10000 };
  }

  function lowStock(item) {
    return item.reorderPoint && Number(item.quantity) <= Number(item.reorderPoint);
  }

  function itemText(item) {
    return [
      item.item,
      item.artist,
      item.matrix,
      item.quantityLabel,
      item.location,
      item.status,
      item.tableName,
      item.notes,
      item.sectionTitle,
      Array.isArray(item.details) ? item.details.join(' ') : ''
    ].join(' ').toLowerCase();
  }

  function filteredItems() {
    const needle = query.trim().toLowerCase();
    if (!needle) return allItems;
    return allItems.filter(item => itemText(item).includes(needle));
  }

  function render(data) {
    if (data.legacy) data = normalizeLegacy(data);
    currentData = data;
    allItems = Array.isArray(data.items) ? data.items : [];

    const visibleItems = filteredItems();
    const missing = Array.isArray(data.missingTables) && data.missingTables.length
      ? `<div>Missing Airtable tabs: ${esc(data.missingTables.join(', '))}</div>`
      : '';

    document.getElementById('source').innerHTML = `
      ${esc(data.source === 'airtable' ? 'Source: Airtable' : 'Source: local fallback')}
      <div>${fmt(allItems.length)} total items</div>
      ${missing}
    `;

    const controls = `
      <section class="controls">
        <label class="search">
          <span>Search</span>
          <input id="inventorySearch" value="${esc(query)}" placeholder="Artist, matrix, item, shelf, location..." autocomplete="off">
        </label>
        <div class="search-count">${fmt(visibleItems.length)} shown / ${fmt(allItems.length)} total</div>
      </section>
    `;

    const sections = DISPLAY_SECTIONS.map(section => {
      const sectionItems = visibleItems
        .filter(item => section.sections.includes(item.section))
        .sort((a, b) => String(a.item || a.artist || '').localeCompare(String(b.item || b.artist || '')));
      const isOpen = openSections.has(section.key) || Boolean(query.trim());
      const sectionTotal = section.key === 'compound'
        ? sectionItems.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0)
        : sectionItems.length;
      const locationCount = new Set(sectionItems.map(item => item.location || 'Unassigned')).size;
      const body = !isOpen ? '' : sectionItems.length
        ? `<div class="section-body"><div class="cards">${sectionItems.map(itemCard).join('')}</div></div>`
        : `<div class="section-body"><div class="empty">${query ? 'No matches in this section.' : 'No Airtable rows found for this tab.'}</div></div>`;

      return `
        <section class="section ${section.key}">
          <button class="section-head" type="button" data-section="${esc(section.key)}" aria-expanded="${isOpen ? 'true' : 'false'}">
            <div class="section-title">
              <div class="section-dot"></div>
              <div>
                <h2>${esc(section.title)}</h2>
                <div class="section-sub">${esc(section.sub)} · ${fmt(locationCount)} locations</div>
              </div>
            </div>
            <div class="section-stats">
              <div class="section-total">${fmt(sectionTotal)}<span>${esc(section.unit)}</span></div>
              <div class="section-hint">${isOpen ? 'Close section' : 'Open section'}</div>
            </div>
          </button>
          ${body}
        </section>
      `;
    }).join('');

    document.getElementById('root').innerHTML = controls + `<div class="inventory-sections">${sections}</div>`;
    const input = document.getElementById('inventorySearch');
    if (input) {
      input.focus({ preventScroll: true });
      input.setSelectionRange(input.value.length, input.value.length);
      input.addEventListener('input', event => {
        query = event.target.value;
        render(currentData);
      });
    }
    document.querySelectorAll('[data-section]').forEach(button => {
      button.addEventListener('click', () => {
        const key = button.getAttribute('data-section');
        if (!key) return;
        if (openSections.has(key)) openSections.delete(key);
        else openSections.add(key);
        render(currentData);
      });
    });
  }

  function itemCard(item) {
    const isLow = lowStock(item);
    const title = item.artist || item.item || 'Unlabeled inventory item';
    const quantity = item.quantityLabel || '';
    const showBar = item.section === 'compound' && Number(item.quantity) > 0 && currentData && currentData.pvcCapacityLbs;

    return `
      <article class="item-card ${isLow ? 'low' : ''}">
        <div class="item-top">
          <div>
            <div class="item-name">${esc(title)}</div>
            ${item.matrix ? `<div class="item-matrix">${esc(item.matrix)}</div>` : ''}
          </div>
          ${quantity ? `<div class="qty">${esc(quantity)}</div>` : ''}
        </div>
        ${showBar ? `<div class="bar"><div class="bar-fill" style="width:${pct(item.quantity, currentData.pvcCapacityLbs)}%"></div></div>` : ''}
        <div class="meta">
          <span class="pill location">${esc(item.location || 'Unassigned')}</span>
          ${item.status ? `<span class="pill">${esc(item.status)}</span>` : ''}
          ${isLow ? `<span class="pill low">Reorder at ${fmt(item.reorderPoint)}</span>` : ''}
        </div>
        ${Array.isArray(item.details) && item.details.length ? `<div class="meta">${item.details.map(detail => `<span class="pill">${esc(detail)}</span>`).join('')}</div>` : ''}
        ${item.notes ? `<div class="notes">${esc(item.notes)}</div>` : ''}
      </article>
    `;
  }

  fetch('/api/staff/inventory')
    .then(response => response.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      render(data);
    })
    .catch(error => {
      document.getElementById('root').innerHTML = `<p class="error">Failed to load inventory data. ${esc(error.message || error)}</p>`;
    });
})();
</script>
</body>
</html>
